services:
  postgres:
    image: postgres:16-alpine
    container_name: aivoa-crm-postgres
    environment:
      POSTGRES_DB: aivoa_crm
      POSTGRES_USER: aivoa
      POSTGRES_PASSWORD: aivoa
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aivoa -d aivoa_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
